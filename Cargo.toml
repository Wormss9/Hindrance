[package]
name = "Hindrance"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
bevy = { version = "0.18.x", default-features = false, features = ["2d"] }
bevy-steamworks = "0.16.x"
strum = { version = "0.28.x", features = ["derive"] }
log = { version = "*", features = ["max_level_debug", "release_max_level_off"] }
bevy_replicon_quinnet = "0.19.0"
enum_dispatch = "0.3.13"
winit = "*"
image = "0.25.x"

[dev-dependencies]
bevy = { version = "0.18.x", default-features = false, features = ["debug"] }

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
strip = "symbols"
debug = 0
