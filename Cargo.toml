[package]
name = "Hindrance"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18.x", default-features = false, features = ["2d", "debug", "dynamic_linking"] }
bevy-steamworks = "0.16.x"
strum = { version = "0.28.x", features = ["derive"] }
log = { version = "*", features = ["max_level_debug", "release_max_level_warn"] }
bevy_replicon_quinnet = "0.19.0"


[profile.release]
opt-level = "z"
lto = true
panic = "abort"
strip = true

