[package]
name = "Hindrance"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18.x", default-features = false, features = [
    "2d",
    "debug",
] }
bevy-steamworks = "0.16.x"
strum = { version = "0.28.x", features = ["derive"] }

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
strip = true
